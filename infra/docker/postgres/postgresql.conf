# postgresql.conf — Tuning per Il Platinatore AI
# Ottimizzato per: query vettoriali pgvector, HNSW index, BullMQ workload
# Riferimento: Playbook v2.5 Ultimate

# ── Memoria ──────────────────────────────────────────────────
shared_buffers = 256MB
effective_cache_size = 768MB
work_mem = 16MB
maintenance_work_mem = 128MB

# ── WAL / Checkpoint ─────────────────────────────────────────
wal_level = replica
max_wal_size = 1GB
min_wal_size = 80MB
checkpoint_completion_target = 0.9

# ── Connessioni ───────────────────────────────────────────────
max_connections = 100

# ── Query planner ─────────────────────────────────────────────
random_page_cost = 1.1
effective_io_concurrency = 200

# ── Logging ───────────────────────────────────────────────────
log_min_duration_statement = 1000
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '
log_checkpoints = on
log_connections = off
log_disconnections = off
log_lock_waits = on

# ── pgvector HNSW ─────────────────────────────────────────────
# hnsw.ef_search viene settato a livello di sessione (SET LOCAL) prima delle query vettoriali
# Non impostare qui per evitare override globale indesiderato
