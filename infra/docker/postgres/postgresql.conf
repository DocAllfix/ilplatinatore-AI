# postgresql.conf — Tuning per Il Platinatore AI
# Ottimizzato per: VPS 8GB RAM / 4 vCPU, pgvector HNSW, BullMQ workload
# Riferimento: Playbook v2.5 Ultimate + Audit Fixes

# ── Connessioni ───────────────────────────────────────────────
# AUDIT FIX (Fatal Flaw #1 + R4): alzato a 40 per dare respiro a:
#   PgBouncer server-side (~9 conn) + migration runner (diretto) +
#   autovacuum aggressivo + backup notturno + embedding worker + admin
# Budget RAM worst-case: 40 × 16MB work_mem = 640MB transitori — dentro i 3GB di mem_limit
listen_addresses = '*'
max_connections = 40

# ── Memoria ──────────────────────────────────────────────────
# AUDIT FIX (Fatal Flaw #1): valori ridimensionati per coesistere con
#   Node.js (~500MB), Redis (512MB), Python harvester (~400MB), OS
shared_buffers = 1536MB
effective_cache_size = 4GB
# AUDIT FIX (Fatal Flaw #1): 16MB × 25 conn × ~3 sort node = ~1.2GB transient max
work_mem = 16MB
# AUDIT FIX (Fatal Flaw #1): ridotto da 512MB a 256MB — evita OOM durante VACUUM/CREATE INDEX
maintenance_work_mem = 256MB

# ── WAL / Checkpoint ─────────────────────────────────────────
wal_level = replica
wal_buffers = 64MB
min_wal_size = 1GB
max_wal_size = 4GB
checkpoint_completion_target = 0.9

# ── Query planner ─────────────────────────────────────────────
random_page_cost = 1.1
effective_io_concurrency = 200
default_statistics_target = 100

# ── Logging ───────────────────────────────────────────────────
log_min_duration_statement = 1000
log_statement = 'ddl'
statement_timeout = '30s'
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '
log_checkpoints = on
log_connections = off
log_disconnections = off
log_lock_waits = on

# ── pgvector HNSW ─────────────────────────────────────────────
# AUDIT FIX (R3): ef_search=40 globale dava recall ~85-90% su 100k+ embedding —
#   inaccettabile per RAG (LLM allucina se la guida "giusta" non viene recuperata).
#   Default bilanciato alzato a 100; le query possono fare SET LOCAL per override:
#     Autocomplete UI / similarità veloci: SET LOCAL hnsw.ef_search = 40  (~40ms)
#     Default search:                      hnsw.ef_search = 100            (~70-80ms)
#     Retrieval RAG critico pre-LLM:       SET LOCAL hnsw.ef_search = 200  (~120ms, recall >98%)
hnsw.ef_search = 100
