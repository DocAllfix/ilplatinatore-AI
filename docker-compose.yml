version: "3.8"

# ─────────────────────────────────────────────────────────────
# Il Platinatore AI — Docker Compose (produzione / base)
# Override dev: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# ─────────────────────────────────────────────────────────────

networks:
  platinatore-net:
    driver: bridge

volumes:
  postgres_data:
  redisdata:
  # Volume per upload utente (avatar). Necessario perché il container `api`
  # ha read_only:true; i named volumes bypassano la restrizione del filesystem.
  uploads_data:

services:

  # ── PostgreSQL + pgvector ──────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: platinatore-postgres
    restart: unless-stopped
    networks:
      - platinatore-net
    # Il volume è scrivibile nonostante read_only: true (è un mount separato)
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    # ── AUDIT FIX (Fatal Flaw #1): limiti risorse espliciti
    mem_limit: 3g
    memswap_limit: 3g
    cpus: "2.0"
    # ── AUDIT FIX (Docker): sicurezza container
    # cap_drop ALL + cap_add minimal set: l'entrypoint postgres ha bisogno di
    # CHOWN/DAC_OVERRIDE/FOWNER per fare chown/chmod della data dir al primo boot,
    # e SETUID/SETGID per switchare dal root entrypoint all'utente postgres (UID 999).
    # Senza queste capability chmod fallisce con "Operation not permitted".
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETUID
      - SETGID
    read_only: true
    # AUDIT FIX (R5): tmpfs con size espliciti — senza questi read_only blocca PostgreSQL al boot
    #   (non può creare socket/stat files). /var/lib/postgresql/data resta scrivibile via volume.
    # NOTA: pg_stat_tmp rimosso — in PG16 stats_temp_directory non esiste più
    #   (stat collector sostituito da shared memory). Un tmpfs annidato qui causa
    #   conflitti di mount con il volume parent su Docker Desktop/WSL2.
    tmpfs:
      - /tmp:size=512M
      - /var/run/postgresql:size=64M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── PgBouncer — Connection Pooler OBBLIGATORIO ─────────────
  # L'app si connette SEMPRE qui (porta 6432), MAI direttamente a postgres (5432)
  # ECCEZIONE: migrate.sh usa POSTGRES_DIRECT_URL (5432) per le migration
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: platinatore-pgbouncer
    restart: unless-stopped
    networks:
      - platinatore-net
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      # edoburu/pgbouncer ascolta di default sulla 5432 DENTRO il container.
      # Forziamo 6432 così tutto è coerente con il port mapping e con DATABASE_URL dell'app.
      LISTEN_PORT: "6432"
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "200"
      DEFAULT_POOL_SIZE: "9"
      MIN_POOL_SIZE: "2"
      RESERVE_POOL_SIZE: "2"
    ports:
      - "6432:6432"
    # ── AUDIT FIX: mem_limit esplicito (processo leggero, ~10-30MB tipici)
    mem_limit: 256m
    memswap_limit: 256m
    cpus: "0.2"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 6432 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis — Cache + Rate Limiting + Job Queue (BullMQ) ─────
  redis:
    image: redis:7-alpine
    container_name: platinatore-redis
    restart: unless-stopped
    networks:
      - platinatore-net
    # Il volume /data resta scrivibile (appendonly/RDB) nonostante read_only: true
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    # ── AUDIT FIX (Fatal Flaw #1): limiti risorse espliciti
    mem_limit: 768m
    memswap_limit: 768m
    cpus: "0.5"
    # ── AUDIT FIX (Docker): sicurezza container
    # L'entrypoint redis:7-alpine fa su-exec root→redis; servono SETUID/SETGID.
    # Per appendonly/RDB sul volume /data servono anche CHOWN/DAC_OVERRIDE/FOWNER.
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETUID
      - SETGID
    read_only: true
    # AUDIT FIX (R5): tmpfs con size esplicito
    tmpfs:
      - /tmp:size=128M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── API — Backend Node.js ──────────────────────────────────
  # Placeholder: Dockerfile verrà completato nelle fasi successive
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: platinatore-api
    restart: unless-stopped
    networks:
      - platinatore-net
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3000:3000"
    env_file:
      - .env
    # ── AUDIT FIX (Fatal Flaw #1): limiti risorse espliciti
    mem_limit: 1g
    memswap_limit: 1g
    cpus: "1.5"
    # ── AUDIT FIX (Docker): sicurezza container
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    # Mount persistente per upload utente (avatar). Bypassa read_only:true.
    # In dev override docker-compose.dev.yml aggiunge altri volumes (./backend/src),
    # Docker Compose concatena le liste — no conflitto.
    volumes:
      - uploads_data:/app/uploads
    # AUDIT FIX (R5): tmpfs con size espliciti
    # Nota: /app/dist è nell'image in produzione — aggiunto come tmpfs solo in docker-compose.dev.yml
    tmpfs:
      - /tmp:size=256M
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── Scraper — Worker scraping (interno, nessuna porta) ─────
  # Placeholder: Dockerfile verrà completato nelle fasi successive
  scraper:
    build:
      context: ./scraper
      dockerfile: Dockerfile
    container_name: platinatore-scraper
    restart: unless-stopped
    networks:
      - platinatore-net
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    # ── AUDIT FIX (Fatal Flaw #1): limiti risorse espliciti
    mem_limit: 1g
    memswap_limit: 1g
    cpus: "1.0"
    # ── AUDIT FIX (Docker): sicurezza container
    cap_drop:
      - ALL
    read_only: true
    # AUDIT FIX (R5): tmpfs con size esplicito
    tmpfs:
      - /tmp:size=256M
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Harvester — Infinite Ingestion Engine (Python) ─────────
  # Placeholder: entry point verrà completato nelle fasi successive
  harvester:
    build: ./harvester
    # AUDIT FIX (Fatal Flaw #1): ridotto da 2g a 512m — l'harvester senza Playwright
    # usa solo httpx/selectolax, non ha bisogno di 2GB
    mem_limit: 512m
    memswap_limit: 512m
    cpus: "1.0"
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    # AUDIT FIX (Docker): sicurezza container
    cap_drop:
      - ALL
    read_only: true
    # AUDIT FIX (R5): size esplicito; l'harvester scrive temp file HTML
    tmpfs:
      - /tmp:size=512M
    # AUDIT FIX (Docker + W-ARCH-2): Healthcheck per harvester con heartbeat file.
    # Il precedente `import sys; sys.exit(0)` verificava solo che Python fosse installato (no-op).
    # Ora il processo principale deve toccare /tmp/harvester_heartbeat ogni minuto nel loop
    # dell'orchestratore (aggiungere `Path('/tmp/harvester_heartbeat').touch()` nel ciclo).
    # L'healthcheck verifica che il file sia stato modificato negli ultimi 5 minuti.
    healthcheck:
      test: ["CMD", "python", "-c", "import os, time; assert time.time() - os.path.getmtime('/tmp/harvester_heartbeat') < 300, 'Heartbeat stale'"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379/1
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GOOGLE_EMBEDDING_API_KEY=${GOOGLE_EMBEDDING_API_KEY}
      - IGDB_CLIENT_ID=${IGDB_CLIENT_ID}
      - IGDB_CLIENT_SECRET=${IGDB_CLIENT_SECRET}
      - HARVESTER_LOG_LEVEL=${HARVESTER_LOG_LEVEL:-INFO}
      - HARVESTER_DAILY_GEMINI_LIMIT=${HARVESTER_DAILY_GEMINI_LIMIT:-5000}
      - HARVESTER_DAILY_EMBEDDING_LIMIT=${HARVESTER_DAILY_EMBEDDING_LIMIT:-50000}
    networks:
      - platinatore-net
